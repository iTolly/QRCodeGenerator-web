<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>QR Generator</title>
    
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: "Helvetica", Arial, sans-serif;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("..//static/IMG_69144.jpg") repeat-x;
            background-size: cover;
            opacity: 0.6;
            z-index: -1;
            animation: continuousMove 60s linear infinite;
        }

        @keyframes continuousMove {
            from { background-position: 0 0; }
            to { background-position: 1000px 0; }
        }

        .main-frame {
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px); 
            background-color: rgba(227, 209, 222, 0.4);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid #bec2d2;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            width: 90%; 
            max-width: 350px; 
            text-align: center;
            box-sizing: border-box; 
        }

        
        @media (max-width: 480px) {
            .main-frame {
                padding: 25px 20px; 
            }
            h1 {
                font-size: 22px; 
            }
            .footer {
                font-size: 14px !important; 
            }
        }

        h1 {
            font-size: 28px;
            font-weight: bold;
            color: #2f3640;
            margin-bottom: 25px;
        }

        label {
            display: block;
            text-align: left;
            font-size: 12px;
            color: #7f8c8d;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ced4da;
            background-color: #f1f2f6;
            border-radius: 14px;
            box-sizing: border-box;
            outline: none;
            font-size: 16px; 
        }

        input:hover {
            border-color: #b88fad;
            box-shadow: 0 0 5px rgba(162, 155, 254, 0.5);
        }

        .btn-generate {
            width: 100%;
            padding: 14px;
            border-radius: 15px;
            background-color: #b88fad;
            color: white;
            border: none;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-generate:hover {
            background-color: #a07b96;
            transform: scale(1.05);
        }

        .footer {
            margin-top: 20px;
            font-size: 20px;
            color: #a07b96;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="main-frame">
        <h1>QR Generator</h1>
        <form action="/generate" method="POST">
            <label>URL or Text</label>
            <input type="text" name="data" placeholder="Enter text here..." required>

            <label>Save As (Filename)</label>
            <input type="text" name="filename" placeholder="Enter filename..." required>

            <button type="submit" class="btn-generate">GENERATE NOW</button>
        </form>
    </div>

    <div class="footer">♥♥♥♥♥♥</div>

</body>
</html>
